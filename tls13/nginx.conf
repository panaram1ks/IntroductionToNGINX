events { }

http {  # Layer 7 -> http

    # invoke default loadbalancer algorithm
    upstream allbackend {
        ip_hash; # load balancing algorithm (stick to one servers ip address)
        server 127.0.0.1:2222;
        server 127.0.0.1:3333;
    }

    upstream app1backend {
        server 127.0.0.1:2222;
        server 127.0.0.1:3333;
    }

    upstream app2backend {
        server 127.0.0.1:4444;
        server 127.0.0.1:5555;
    }

    server {
        listen 9090;

        #public key generated by Let's encrypt
        ssl_certificate /etc/folder1/folder2/nginxtest.ddns.net/fullchain.pem
        #private key generated by Let's encrypt
        ssl_certificate_key /etc/folder1/folder2/nginxtest.ddns.net/privkey.pem

        ssl_protocols TLSv1.3;
        location / {
            proxy_pass http://allbackend/;
        }

        location /app1 {
            proxy_pass http://app1backend/;
        }

        location /app2 {
            proxy_pass http://app2backend/;
        }

        # forbidden admin
        location /admin {
            return 403;
        }

    }
}